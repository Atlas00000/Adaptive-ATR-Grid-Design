# AAG E8 ML pipeline configuration

baseline:
  preset: AAG_EURUSD_M5_production.set
  symbol: EURUSD
  timeframe: M5
  production_trades_19mo: 324
  production_pf_19mo: 1.46
  production_net_19mo: 623.0
  production_dd_equity_19mo: 23.0

paths:
  export_dir: export
  features_dir: features
  models_dir: models

windows:
  discovery: ["2025-01-01", "2025-07-31"]
  extended: ["2025-01-01", "2026-07-31"]
  longest: null  # fill with full available range

walk_forward:
  train_months: 3
  test_months: 1

# E7 validation gates (EDGE-702 walk-forward + EDGE-703 Monte Carlo)
e7_gates:
  wf_test_pf_floor: 1.0
  wf_test_net_min: 0.0
  wf_test_min_trades: 5
  wf_min_fold_pass_rate: 0.75          # >= 3/4 test folds
  mc_iterations: 2000
  mc_seed: 42
  longest_pf_floor: 1.1                # LOCK-202 live gate (longest window)
  lock202_wire_pf_floor: 1.05
  lock202_wire_dd_max_pct: 25.0        # 19-mo production reference
  lock_ai_wire_pf_floor: 1.05
  lock_ai_longest_pf_floor: 1.05
  tail_loss_usd: -35.0

# Anti-overfilter thresholds (match Utils.mqh / ai_enhance.md)
thresholds:
  entry_block_floor: 0.12
  entry_block_confidence_min: 0.90
  health_no_add: 55
  health_flatten: 88
  regime_trend_skip_prob: 0.62  # LR wire model — max ~0.69 on train; 0.85 never fires
  lot_mult_min: 0.65
  lot_mult_max: 1.00
  volume_floor_pct: 0.85

promotion_gates:
  min_trades_pct: 0.85
  net_vs_production_pct: -0.05
  dd_improve_pts: 3
  longest_pf_floor: 0.95

# AI-810 event replay (simulate_policy --policy health)
health_sim:
  mode: flatten_only   # flatten_only | full — matches EA v1.15 wire
  checkpoint_sec: 60
  flatten_float_usd: -18.0
  stress_flatten_at: 75.0
  hard_cap_enabled: true
  hard_cap_usd: -25.0
  hard_cap_l1_enabled: true
  hard_cap_l1_usd: -28.0
  hard_cap_l1_min_sec: 30

# AI-805p wired stack (simulate_policy --policy regime_805p)
health_805p:
  mode: flatten_only
  checkpoint_sec: 60
  flatten_float_usd: -18.0
  stress_flatten_at: 75.0
  hard_cap_enabled: true
  hard_cap_usd: -25.0
  hard_cap_l1_enabled: true
  hard_cap_l1_usd: -28.0
  hard_cap_l1_min_sec: 30
  basket_cap_enabled: true
  basket_cap_usd: -32.0
  basket_cap_min_legs: 1
  sl_cascade_enabled: true
  sl_cascade_min_legs: 2
  sl_cascade_any_partial: false
  sl_cascade_loss_usd: -9.0
  sl_cascade_stack_usd: -28.0
  sl_cascade_use_float: false
  sl_cascade_float_usd: -8.0

# AI-806 offline promotion gates (vs 805p replay baseline)
regime_gates:
  min_trades_pct: 0.80
  net_vs_805p_pct: 0.0
  longest_pf_floor: 1.05
  tail_loss_usd: -35.0
  max_skip_rate: 0.15

# AI-804 offline promotion gates (vs LOCK-AI / memory_805p)
entry_gates:
  min_trades_pct: 0.85
  net_vs_lock_ai_pct: -0.05
  dd_improve_pts: 2.0

features_entry:
  - rsi
  - adx
  - atr
  - atr_pct_100
  - ema_slope
  - spread_pips
  - hour
  - weekday
  - month
  - rolling_wr_10
  - rolling_wr_20
  - rolling_pf_20

features_health:
  - grid_depth
  - floating_pl
  - seconds_open
  - atr_delta
  - adx_delta
  - dist_anchor_atr
  - mfe_so_far
  - mae_so_far

labels:
  basket_won: "basket_pnl > 0"
  tail_loss: "basket_pnl < -20 or basket_pnl < -2 * avg_win"

# AI-807 exit / expectancy research (offline only — no EA wire)
exit_policy:
  partial_l0_1r:
    enabled: true
    health_threshold: 40.0
    partial_fraction: 0.50
    min_one_r_usd: 6.0
  dynamic_tp:
    enabled: true
    base_tp_atr: 1.5
    edge_tp_scale: 0.5
    weak_edge_cutoff: 0.50
    early_capture_r: 0.90
  runner_lock:
    enabled: true
    activate_float_usd: 10.0
    lock_float_usd: 8.0

expectancy_gates:
  min_trades_pct: 0.85
  net_vs_lock_ai_pct: -0.05
  tail_loss_usd: -35.0
  avg_win_improve_pct: 0.05
  avg_loss_improve_pct: 0.05

# E9b grid geometry offline sweep (e9b_grid_geometry.py)
e9b_gates:
  min_trades_pct: 1.0                 # same basket count (geometry overlay)
  net_vs_baseline_pct: 0.0            # must improve net vs baseline
  tail_loss_usd: -35.0
  d2_pf_floor: 1.0

e9b_policies:
  geometry_rule: no_add_after_l0_sl

# E9d physics stack-risk labels + gate (e9d_physics_labels.py, e9d_simulate.py)
e9d_gates:
  promote_threshold: 0.45
  h1_net_min: -80.0

e9d_policies:
  promote_candidate: physics_lr_p45   # L0-SL LR gate @ 0.45

# E9c context-gated geometry (e9c_context_geometry.py)
e9c_gates:
  net_vs_prod_pct: -0.05               # w02 net >= prod * 0.95 ($591)
  w03_net_delta_min: 50.0              # improve w03 vs baseline by >= $50
  tail_loss_usd: -35.0
  max_gated_pct: 55.0                  # gate must not fire >55% on w02
e9c_policies:
  promote_candidate: adx_lt_18       # entry ADX < 18 -> no_add_after_l0_sl

# E9a basket intelligence segments (e9a_basket_intelligence.py)
e9a_segments:
  stress_pocket: "2024_h1"
  bleed_months: ["2024-04", "2024-05", "2024-06", "2024-07"]
  underwater_usd: 1.0                 # path_mae threshold for "underwater"
  long_basket_sec: 14400               # 4h

models:
  entry_context: entry_context_v0
  basket_health: basket_health_v0
  regime: regime_v0
